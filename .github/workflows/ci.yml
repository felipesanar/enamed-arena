name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs of the same workflow on the same ref. Saves
# minutes when a PR is force-pushed multiple times in a row.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --omit=optional
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --omit=optional
      - run: npm run typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --omit=optional
      - run: npm run test

  edge-pins:
    name: Edge Function pins
    runs-on: ubuntu-latest
    # Trava anti-regressão: falha se alguma Edge Function importar dep externa
    # sem pin completo (major.minor.patch). Ver docs/INCIDENTE_2026_05_17.md.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/check-edge-function-pins.mjs

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --omit=optional
      # Build with mock env so the bundle resolves import.meta.env at compile time.
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-anon-key
          VITE_SUPABASE_PROJECT_ID: example

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    # Non-blocking by default — fails CI only on HIGH and CRITICAL CVEs.
    # Use `continue-on-error: true` when you need a one-off bypass.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --omit=optional
      - run: npm audit --audit-level=high
